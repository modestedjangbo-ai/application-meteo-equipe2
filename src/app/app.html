<div style="text-align:center; padding: 50px; font-family: Arial, sans-serif;">
      <h1 style="color: #333;">🌦️ Météo actuelle</h1>
      <div style="margin-bottom: 20px;">
         <div class="search-box">
  <input
    type="text"
    [ngModel]="villeRecherchee()"
    (ngModelChange)="villeRecherchee.set($event)"
    placeholder="Entrez une ville..."
  >
  
  <button (click)="chercherMeteo()">Chercher</button>
</div>
        
           <p>
          {{ villeRecherchee()}}</p>
</div>
      <p style="font-size: 3em; font-weight: bold; color: #007bff;">{{ temperature() }}</p>
    </div>
